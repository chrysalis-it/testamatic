name: Publish

concurrency:
  group: build-deploy-${{ github.ref_name }}
  cancel-in-progress: false

on:
  workflow_dispatch

jobs:
  ci:
    uses: ./.github/workflows/wf-ci.yml
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    name: Publish
    needs: ci
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Git User
        run: |
          git config user.email "getpaulj@gmail.com"
          git config user.name "getpaulj - ci pipeline"

      - name: Setup NPM
        uses: actions/setup-node@v5
        with:
          node-version: 20
          scope: '@chrysalis-it'

      - name: Install Dependencies
        working-directory: .
        run: npm ci

      - name: Lerna Version
        if: ${{ github.ref_name == 'main' }}
        run: npm run all:version

      - name: Show Changed
        if: ${{ github.ref_name == 'main' }}
        id: show_changed
        run: |
          COMMITS=$(git rev-list --reverse origin/main..HEAD | wc -l)
          if [ $COMMITS > 0 ]; then
            echo "Changes Detected"
            echo "has_changes=Yes" >> $GITHUB_OUTPUT
          else
            echo "No Change Detected"
            echo "has_changes=No" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: ${{ github.ref_name == 'main' && success() && steps.show_changed.outputs.has_changes == 'Yes' }}
        run: |
          set -e
          git status
          npm run all:compile

      - name: Setup Publish NPM
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@chrysalis-it'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_NPM_TOKEN }}

      - name: Verify NPM Auth
        if: ${{ github.ref_name == 'main' && success() && steps.show_changed.outputs.has_changes == 'Yes' }}
        run: |
          if ! WHOAMI=$(npm whoami --registry=https://registry.npmjs.org 2>&1); then
            echo "::error title=NPM auth failed::Could not authenticate to npmjs.org. The PUBLISH_NPM_TOKEN secret is likely missing, expired, or lacks write access to the @chrysalis-it scope. npm reports auth failures as a generic 404 on publish, so fix the token before re-running. Detail: $WHOAMI"
            exit 1
          fi
          echo "Authenticated to npmjs.org as: $WHOAMI"
          if [ "$WHOAMI" != "getpaulj" ]; then
            echo "::error title=Unexpected npm user::Token belongs to '$WHOAMI', but @chrysalis-it packages are owned by 'getpaulj'. Publish would 404. Use a token from the getpaulj account."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_NPM_TOKEN }}

      - name: Publish
        if: ${{ github.ref_name == 'main' && success() && steps.show_changed.outputs.has_changes == 'Yes' }}
        run: |
          set -e
          git status
          npm run all:publish
          git push --follow-tags --no-verify
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PUBLISH_NPM_TOKEN }}
